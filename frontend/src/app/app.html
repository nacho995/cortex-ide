<div class="ide-container">
  <app-toolbar />
  <div class="ide-main">
    @if (project.sidebarVisible()) {
      <div class="sidebar">
        <app-file-tree />
      </div>
      <div class="resize-handle sidebar-handle"></div>
    }
    <div class="center">
      <app-tabs />
      <div class="editor-area">
        @if (project.activeTab()) {
          <app-editor />
        } @else {
          <app-welcome />
        }
      </div>
      @if (project.terminalVisible()) {
        <div class="resize-handle terminal-handle"></div>
        <div class="terminal-panel">
          <app-terminal />
        </div>
      }
    </div>
    @if (project.aiPanelVisible()) {
      <div class="resize-handle ai-handle"></div>
      <div class="ai-panel">
        <app-ai-chat />
      </div>
    }
  </div>
  <app-status-bar />
</div>
