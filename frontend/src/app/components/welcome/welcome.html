<div class="welcome">
  <div class="logo-area">
    <h1 class="logo">CORTEX</h1>
    <span class="ide-label">IDE</span>
  </div>
  <p class="tagline">AI-Powered Development Environment</p>

  <div class="actions">
    <button class="btn-primary" (click)="open()">
      📁 Open Project
    </button>
  </div>

  <div class="shortcuts">
    <div class="shortcut"><kbd>Ctrl+S</kbd> Save file</div>
    <div class="shortcut"><kbd>☰</kbd> Toggle sidebar</div>
    <div class="shortcut"><kbd>⌨</kbd> Toggle terminal</div>
    <div class="shortcut"><kbd>🤖</kbd> Toggle AI panel</div>
  </div>

  <div class="version">Cortex IDE v0.1.0</div>
</div>
