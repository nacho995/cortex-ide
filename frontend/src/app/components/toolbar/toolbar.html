<div class="toolbar">
  <div class="left">
    <span class="logo">CORTEX</span>
    <span class="sub">IDE</span>
    @if (project.projectName()) {
      <span class="proj">{{ project.projectName() }}</span>
    }
  </div>
  <div class="right">
    <label class="bg-picker">
      Background
      <select [ngModel]="ui.background()" (ngModelChange)="setBackground($event)">
        @for (mode of backgroundModes; track mode) {
          <option [ngValue]="mode">{{ mode }}</option>
        }
      </select>
    </label>
    <button (click)="toggleMatrixRain()" title="Toggle Matrix Rain">
      {{ ui.matrixRainEnabled() ? 'Matrix ON' : 'Matrix OFF' }}
    </button>
    <button (click)="openProject()" title="Open Project">📁 Open</button>
    <button
      (click)="project.toggleLayout()"
      [title]="project.layoutMode() === 'agent' ? 'Switch to Editor mode' : 'Switch to Agent mode'"
    >
      {{ project.layoutMode() === 'agent' ? '📝' : '⚡' }}
    </button>
    <button (click)="project.toggleSidebar()" title="Toggle Sidebar">☰</button>
    <button (click)="project.toggleTerminal()" title="Toggle Terminal">⌨</button>
    <button (click)="project.toggleAiPanel()" title="Toggle AI Panel">🤖</button>
  </div>
</div>
